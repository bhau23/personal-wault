name: wault_secure
description: "A secure, offline-first cross-platform password manager with cloud sync."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Encryption & Security
  encrypt: ^5.0.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2

  # Firebase & Cloud Sync
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2

  # State Management
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
