name: Build Wault Native Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # Since we didn't have the SDK on your PC to generate the Android scaffolding,
      # we are forcing the Cloud to do it for us right now!
      - name: Generate Missing Flutter Boilerplate
        run: |
          flutter create temp_app --platforms=android
          cp -r temp_app/android ./android
          rm -rf temp_app
          
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - run: flutter config --enable-windows-desktop
      
      # Force Windows Cloud to generate the Windows Scaffolding:
      - name: Generate Missing Flutter Boilerplate
        run: |
          flutter create temp_app --platforms=windows
          Copy-Item -Path "temp_app\windows" -Destination "windows" -Recurse
          Remove-Item -Path "temp_app" -Recurse -Force
          
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Windows-EXE
          path: build\windows\x64\runner\Release
