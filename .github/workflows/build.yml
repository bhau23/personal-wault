name: Build Wault Native Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Generate Android scaffolding since it's not in the repo
      - name: Generate Android Scaffolding
        run: |
          flutter create temp_app --platforms=android
          cp -r temp_app/android ./android
          rm -rf temp_app

      # flutter_secure_storage and sqflite need minSdkVersion 21+
      - name: Set minSdkVersion
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle

      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter config --enable-windows-desktop

      # Generate Windows scaffolding since it's not in the repo
      - name: Generate Windows Scaffolding
        run: |
          flutter create temp_app --platforms=windows
          Copy-Item -Path "temp_app\windows" -Destination "windows" -Recurse
          Remove-Item -Path "temp_app" -Recurse -Force

      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Windows-EXE
          path: build\windows\x64\runner\Release
