name: Build Wault Native Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Generate Android scaffolding with correct package name for Firebase
      - name: Generate Android Scaffolding
        run: |
          flutter create temp_app --platforms=android --org com.wault --project-name secure
          cp -r temp_app/android ./android
          rm -rf temp_app

      # Copy Firebase config from repo (directory has a typo in the repo)
      - name: Copy google-services.json
        run: cp andriod/app/google-services.json android/app/google-services.json

      # Configure Android build for Firebase and flutter_secure_storage
      - name: Configure Android Build
        run: |
          # --- App-level build file (android/app/build.gradle.kts or build.gradle) ---
          if [ -f android/app/build.gradle.kts ]; then
            # Kotlin DSL: set minSdk, compileSdk, and add Google Services plugin
            sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle.kts
            sed -i 's/compileSdk = .*/compileSdk = 34/' android/app/build.gradle.kts
            # Add Google Services plugin to plugins block
            sed -i '/^plugins {/a\    id("com.google.gms.google-services")' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            # Groovy DSL: set minSdk, compileSdk, and add Google Services plugin
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
            sed -i 's/minSdk .*/minSdk 21/' android/app/build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
            sed -i 's/compileSdk .*/compileSdk 34/' android/app/build.gradle
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi

          # --- Project-level settings (android/settings.gradle.kts or android/build.gradle) ---
          # In modern Flutter, settings.gradle.kts has a top-level plugins{} block
          # (separate from pluginManagement). We add the Google Services plugin there.
          if [ -f android/settings.gradle.kts ]; then
            # Find the top-level plugins block (after pluginManagement) and add our plugin
            # Use awk to insert after the LAST 'plugins {' line (which is the top-level one)
            awk '
              /^plugins \{/ { found=NR }
              { lines[NR]=$0 }
              END {
                for(i=1;i<=NR;i++) {
                  print lines[i]
                  if(i==found) print "    id(\"com.google.gms.google-services\") version \"4.4.2\" apply false"
                }
              }
            ' android/settings.gradle.kts > android/settings.gradle.kts.tmp
            mv android/settings.gradle.kts.tmp android/settings.gradle.kts
          elif [ -f android/build.gradle ]; then
            # Groovy DSL: add classpath to buildscript dependencies
            sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
          fi

      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter config --enable-windows-desktop

      # Generate Windows scaffolding
      - name: Generate Windows Scaffolding
        run: |
          flutter create temp_app --platforms=windows --org com.wault --project-name secure
          Copy-Item -Path "temp_app\windows" -Destination "windows" -Recurse
          Remove-Item -Path "temp_app" -Recurse -Force

      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: Wault-Windows-EXE
          path: build\windows\x64\runner\Release
